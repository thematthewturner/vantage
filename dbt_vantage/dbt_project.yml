name: vantage
version: "0.1.0"
config-version: 2

profile: vantage

model-paths: ["models"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
snapshot-paths: ["snapshots"]

target-path: target
clean-targets:
  - target
  - dbt_packages

models:
  vantage:
    staging:
      +materialized: view
    marts:
      +materialized: table
    metrics:
      +materialized: view

seeds:
  vantage:
    dim_segment_seed:
      +column_types:
        segment: VARCHAR
        denominator_class: VARCHAR
        default_life_type: VARCHAR
        typical_rev_per_unit_low: DECIMAL(20,4)
        typical_rev_per_unit_high: DECIMAL(20,4)
        notes: VARCHAR
    dim_company_seed:
      +column_types:
        company_id: VARCHAR
        legal_name: VARCHAR
        status: VARCHAR
        ticker: VARCHAR
        exchange: VARCHAR
        cik: VARCHAR
        segment: VARCHAR
        sub_segment: VARCHAR
        business_model: VARCHAR
        is_public_benefit: BOOLEAN
        founded_year: INTEGER
        hq_state: VARCHAR
        website: VARCHAR
        description: VARCHAR
    dim_source_seed:
      +column_types:
        source_id: VARCHAR
        source_type: VARCHAR
        url: VARCHAR
        retrieved_at: TIMESTAMP
        reliability: VARCHAR
    fact_covered_lives_seed:
      +column_types:
        company_id: VARCHAR
        fiscal_period: VARCHAR
        life_type: VARCHAR
        lives_count: BIGINT
        source_id: VARCHAR
    fact_financials_seed:
      +column_types:
        company_id: VARCHAR
        fiscal_period: VARCHAR
        period_end: DATE
        is_guidance: BOOLEAN
        revenue: DECIMAL(20,4)
        gross_profit: DECIMAL(20,4)
        gross_margin: DECIMAL(9,6)
        opex: DECIMAL(20,4)
        adj_ebitda: DECIMAL(20,4)
        net_income: DECIMAL(20,4)
        free_cash_flow: DECIMAL(20,4)
        cash_and_sti: DECIMAL(20,4)
        source_id: VARCHAR
    fact_valuation_seed:
      +column_types:
        company_id: VARCHAR
        as_of_date: DATE
        valuation_usd: DECIMAL(20,4)
        price_per_share: DECIMAL(20,6)
        method: VARCHAR
        source_id: VARCHAR
    fact_funding_round_seed:
      +column_types:
        round_id: VARCHAR
        company_id: VARCHAR
        announced_date: DATE
        round_type: VARCHAR
        amount_usd: DECIMAL(20,4)
        post_money_valuation: DECIMAL(20,4)
        lead_investors_raw: VARCHAR
        source_id: VARCHAR
    fact_market_data_seed:
      +column_types:
        company_id: VARCHAR
        as_of_date: DATE
        shares_diluted: DECIMAL(20,4)
        close_price: DECIMAL(20,4)
        total_debt: DECIMAL(20,4)
        source_id: VARCHAR
    fact_guidance_accuracy_seed:
      +column_types:
        company_id: VARCHAR
        as_of_date: DATE
        guidance_reliability: DECIMAL(9,6)
        n_observations: INTEGER
        prior_strength: VARCHAR
        source_id: VARCHAR
    fact_policy_exposure_seed:
      +column_types:
        company_id: VARCHAR
        ma_rate_exposure: INTEGER
        aca_aptc_exposure: INTEGER
        cmmi_model_dependence: INTEGER
        rationale: VARCHAR
        source_id: VARCHAR
    fact_historical_guidance_seed:
      +column_types:
        company_id: VARCHAR
        fiscal_period: VARCHAR
        metric: VARCHAR
        guided_value: DECIMAL(20,4)
        realized_value: DECIMAL(20,4)
        guidance_issued_date: DATE
        realization_date: DATE
        source_id_guidance: VARCHAR
        source_id_actual: VARCHAR

vars:
  # Currency unit is USD millions across the warehouse (see CLAUDE.md).
  currency_unit: "USD_millions"
