# Core paths and defaults. API keys come from the environment, never here.
[storage]
db_path = "data/vantage.duckdb"
raw_dir = "data/raw"

[index]
base_value = 100.0
base_date = "2010-01-04"   # custom VHC inception; first 2010 trading day
baseline_start_date = "1998-12-22" # start fetching benchmark ETF history (XLV inception)
rebalance = "Q"            # quarterly
