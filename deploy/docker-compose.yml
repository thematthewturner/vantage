# vantage on a single DigitalOcean droplet:
#   caddy      - front door: HTTP on :80, automatic HTTPS on :443 when a
#                hostname is set (CADDY_SITE in .env); reverse-proxies to web
#   web        - the Streamlit terminal (internal, on 8501)
#   scheduler  - runs the daily refresh and shares the data volume with web
#
#   cp deploy/.env.example deploy/.env && edit it, then:
#   docker compose -f deploy/docker-compose.yml up -d --build

name: vantage

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    # CADDY_SITE picks the hostname: unset -> plain HTTP on :80; a real
    # hostname -> automatic Let's Encrypt HTTPS on :443.
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - web

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    env_file: .env
    # Cap resources so a heavy render (e.g. the all-indicator lead-lag heatmap)
    # can't OOM the droplet and take both services down.
    mem_limit: 1g
    cpus: 1.0
    # Reached by caddy over the compose network; not published to the host.
    expose:
      - "8501"
    volumes:
      - vantage-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8501/_stcore/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  scheduler:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    env_file: .env
    # The daily refresh pulls and pivots prices; bound it so a runaway pull
    # can't starve the web service on a small droplet.
    mem_limit: 1g
    cpus: 1.0
    command: ["python", "-m", "vantage.pipeline.scheduler"]
    volumes:
      - vantage-data:/app/data

volumes:
  vantage-data:
  caddy-data:
  caddy-config:
